<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Premium</title>
    <!-- SEO Tags -->
    <meta name="description"
        content="A premium night-mode Tic-Tac-Toe game with neon effects and glassmorphism design.">
    <meta name="theme-color" content="#0d0f17">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Tic Tac Toe</h1>
            <div id="status">Vez do Jogador X</div>
        </header>

        <main class="board">
            <div class="cell" id="cell-0" data-index="0"></div>
            <div class="cell" id="cell-1" data-index="1"></div>
            <div class="cell" id="cell-2" data-index="2"></div>
            <div class="cell" id="cell-3" data-index="3"></div>
            <div class="cell" id="cell-4" data-index="4"></div>
            <div class="cell" id="cell-5" data-index="5"></div>
            <div class="cell" id="cell-6" data-index="6"></div>
            <div class="cell" id="cell-7" data-index="7"></div>
            <div class="cell" id="cell-8" data-index="8"></div>
        </main>

        <footer>
            <button id="restart" aria-label="Reiniciar Jogo">Nova Partida</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
